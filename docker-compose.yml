# =============================================================================
# Democratic Decay Monitor - Docker Compose Configuration
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # API Server (Production)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ddm-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=file:data/democracy.db
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - VDEM_API_KEY=${VDEM_API_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173}
    volumes:
      - api_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ddm-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ---------------------------------------------------------------------------
  # Frontend (Production Nginx)
  # ---------------------------------------------------------------------------
  frontend:
    image: nginx:alpine
    container_name: ddm-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - ddm-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

# =============================================================================
# Volumes & Networks
# =============================================================================

volumes:
  api_data:
    driver: local

networks:
  ddm-network:
    driver: bridge
